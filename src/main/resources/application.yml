server:
  port: 8080

spring:
  datasource:
    url: ${HARNESS_AGENT_DATASOURCE_URL:jdbc:h2:mem:harness_agent;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
    username: ${HARNESS_AGENT_DATASOURCE_USERNAME:sa}
    password: ${HARNESS_AGENT_DATASOURCE_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/vendor-migration/{vendor}

harness-agent:
  default-agent-id: personal-assistant
  default-provider: echo
  state:
    local-directory: .harness-agent/sessions
  memory-rag:
    provider: local
  legacy:
    request-adapter-enabled: false
  agents:
    personal-assistant:
      name: personal-assistant
      system-prompt: 你是个人 Agent 助手，优先服务当前用户的个人工作区、个人记忆、工具确认和长期任务。
      model-provider: echo
      model-name: echo-local
      workspace: .harness-agent/workspaces/personal-assistant
      workload-type: office
      compaction: true
      max-iters: 3
      budget:
        request-limit: 1000
        token-limit: 1000000
    personal-reference-agent:
      name: personal-reference-agent
      system-prompt: 你是个人参考 Agent，回答要准确、克制，并遵守 owner 工具与记忆边界。
      model-provider: echo
      model-name: echo-local
      workspace: .harness-agent/workspaces/personal-reference-agent
      workload-type: office
      compaction: true
      max-iters: 3
  model-providers:
    echo:
      type: echo
      model-name: echo-local
    dashscope:
      type: dashscope
      model-name: qwen-plus
      api-key-ref: env:DASHSCOPE_API_KEY
    openai-compatible:
      type: openai-compatible
      model-name: gpt-4o-mini
      api-key-ref: env:OPENAI_API_KEY
      base-url: https://api.openai.com/v1
    deepseek:
      type: openai-compatible
      model-name: deepseek-v4-flash
      api-key-ref: env:DEEPSEEK_API_KEY
      base-url: https://api.deepseek.com
      endpoint-path: /chat/completions
  production:
    profile: development
    replica-count: 1
    state-store:
      type: local-json
      local-directory: .harness-agent/sessions
      durable-implementation-wired: false
      implementation-name: local-json-development
      # Planning-only local examples; these do not drive real store wiring while type is local-json.
      redis-uri: redis://localhost:6379/0
      mysql-dsn: jdbc:mysql://localhost:3306/harness_agent
    durable-stores:
      session: local-json
      knowledge: local-json
      tool: local-json
      activity: local-json
      telemetry: local-json
      budget-counter: local-json
    schema:
      name: ""
      migration-tool: flyway
      migration-location: classpath:db/migration,classpath:db/vendor-migration/{vendor}
      version: ""
    remote-filesystem:
      root-uri: s3://harness-agent-workspaces
    sandbox:
      enabled: false
      image: harness-agent-sandbox:latest
      workspace-root: /workspace
    snapshot-store:
      type: none
      uri: ""
      implementation-wired: false
      writable-check-enabled: true
    observability:
      enabled: true
      service-name: harness-agent
    telemetry:
      open-telemetry-export-enabled: false
      otlp-endpoint: ""
      durable-store-enabled: false
      durable-store-type: mysql
    health-check:
      enabled: true
      fail-fast: true
      timeout: 5s
      include-failure-reasons: true
    retention:
      activity: 180d
      telemetry: 30d
      snapshots: 14d
    budget:
      request-limit: 1000
      token-limit: 1000000
    fallback:
      retryable-status-codes:
        - 429
        - 500
        - 502
        - 503
        - 504
      providers:
        dashscope:
          - echo
    timeouts:
      model-timeout: 2m
      stream-timeout: 5m
      tool-timeout: 30s
      sandbox-timeout: 10m
